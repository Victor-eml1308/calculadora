<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Moderninha</title>
    <style>
        /* CSS: Estilização do Layout */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121214;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .calculadora {
            background-color: #202024;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.4);
            width: 320px;
        }

        #tela {
            width: 100%;
            height: 60px;
            background-color: #121214;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 1.8rem;
            text-align: right;
            padding: 0 15px;
            margin-bottom: 20px;
        }

        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        button {
            padding: 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #29292e;
            color: #e1e1e6;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #323238;
        }

        /* Cores especiais para operadores e igual */
        button.operador {
            background-color: #4f46e5;
            color: #fff;
        }

        button.operador:hover {
            background-color: #6366f1;
        }

        button.limpar {
            background-color: #7c7c8a;
            color: #fff;
        }

        button.limpar:hover {
            background-color: #9466ff;
        }
    </style>
</head>
<body>

    <div class="calculadora">
        <input type="text" id="tela" disabled>

        <div class="botoes">
            <button class="limpar" onclick="limparTela()">C</button>
            <button onclick="inserir('/')">/</button>
            <button onclick="inserir('*')">*</button>
            <button class="operador" onclick="inserir('-')">-</button>

            <button onclick="inserir('7')">7</button>
            <button onclick="inserir('8')">8</button>
            <button onclick="inserir('9')">9</button>
            <button class="operador" onclick="inserir('+')">+</button>

            <button onclick="inserir('4')">4</button>
            <button onclick="inserir('5')">5</button>
            <button onclick="inserir('6')">6</button>
            <button class="operador" style="grid-row: span 2; height: 100%;" onclick="calcular()">=</button>

            <button onclick="inserir('1')">1</button>
            <button onclick="inserir('2')">2</button>
